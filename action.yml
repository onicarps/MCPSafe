name: "MCPCheck"
description: "Scan MCP server for security vulnerabilities"
branding:
  icon: "shield"
  color: "red"
inputs:
  path:
    description: "Path to MCP server directory"
    required: true
    default: "."
  severity:
    description: "Minimum severity to report"
    required: false
    default: "LOW"
  version:
    description: "MCPCheck version to install"
    required: false
    default: "0.1.0"
runs:
  using: "composite"
  steps:
    - name: Install MCPCheck
      shell: bash
      run: pip install mcp-scan-safe==${{ inputs.version }}
    - name: Run MCPCheck
      shell: bash
      run: mcpcheck ${{ inputs.path }} --format sarif --min-severity ${{ inputs.severity }} > mcpcheck-results.sarif
    - name: Upload SARIF
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: mcpcheck-results.sarif
